<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pythagoras Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            margin: 10px;
            padding: 8px;
            width: 100px;
        }
        button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<h2>Pythagorean Theorem Calculator</h2>
<p>Leave one field empty to calculate it</p>

<input type="number" id="a" placeholder="Side a">
<input type="number" id="b" placeholder="Side b">
<input type="number" id="c" placeholder="Side c (hypotenuse)">
<br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script>
function calculate() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);
    let result = document.getElementById("result");

    if (!a && b && c) {
        // calculate a
        result.innerText = "a = " + Math.sqrt(c*c - b*b).toFixed(2);
    } else if (!b && a && c) {
        // calculate b
        result.innerText = "b = " + Math.sqrt(c*c - a*a).toFixed(2);
    } else if (!c && a && b) {
        // calculate c
        result.innerText = "c = " + Math.sqrt(a*a + b*b).toFixed(2);
    } else {
        result.innerText = "Please leave exactly one field empty!";
    }
}
</script>

</body>
</html>
