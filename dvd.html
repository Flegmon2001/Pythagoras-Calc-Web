<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DVD Bounce</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  #logo {
    position: absolute;
    width: 120px;
    height: 60px;
    background: white;
    color: black;
    font-family: Arial, sans-serif;
    font-weight: bold;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="logo">DVD</div>

<script>
  const logo = document.getElementById("logo");

  let x = 100;
  let y = 100;
  let dx = 2;
  let dy = 2;

  function randomColor() {
    return `hsl(${Math.random() * 360}, 100%, 50%)`;
  }

  function animate() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    const rect = logo.getBoundingClientRect();

    x += dx;
    y += dy;

    if (x + rect.width >= width || x <= 0) {
      dx *= -1;
      logo.style.background = randomColor();
    }

    if (y + rect.height >= height || y <= 0) {
      dy *= -1;
      logo.style.background = randomColor();
    }

    logo.style.left = x + "px";
    logo.style.top = y + "px";

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
